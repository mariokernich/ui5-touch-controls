specVersion: "4.0"
metadata:
  name: ui5.touch.controls
type: library
framework:
  name: OpenUI5
  version: 1.147.1
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: themelib_sap_horizon
    - name: themelib_sap_fiori_3
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        generateTsInterfaces: true # always generate the TS interfaces in build
    - name: ui5-tooling-modules-task
      afterTask: replaceVersion
      configuration:
        addToNamespace: true
server:
  customMiddleware:
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
      configuration:
          generateTsInterfaces: true
    - name: ui5-tooling-modules-middleware
      afterMiddleware: ui5-tooling-transpile-middleware
      configuration:
          addToNamespace: true
          prependPathMappings: true
    - name: ui5-middleware-livereload
      afterMiddleware: ui5-tooling-modules-middleware
      configuration:
          port: 35732
          path:
              - "test/"
              - "src/"
